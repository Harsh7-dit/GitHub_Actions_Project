name: Deployment of Nodejs Application using Github Actions CI-CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs:on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy with SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.223.84.161
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/projects/GitHub_Actions_Project/nodejsapp/
            git pull
            docker compose up -d --build
